services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-attendance}
      POSTGRES_USER: ${DB_USER:-attendance}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-attendance}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-attendance} -d ${DB_NAME:-attendance}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-attendance}
      DB_USER: ${DB_USER:-attendance}
      DB_PASSWORD: ${DB_PASSWORD:-attendance}
      RECOGNITION_URL: http://recognition:8001
      MEDIA_DIR: /data/snapshots
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      SEMESTER_START: ${SEMESTER_START:-2026-02-09}
    volumes:
      - snapshots:/data/snapshots
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  recognition:
    build: ./recognition
    environment:
      BACKEND_URL: http://backend:8000
      SNAPSHOT_INTERVAL: ${SNAPSHOT_INTERVAL:-30}
      SNAPSHOT_DIR: /data/snapshots
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.35}
    volumes:
      - snapshots:/data/snapshots
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8001:8001"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  snapshots:
