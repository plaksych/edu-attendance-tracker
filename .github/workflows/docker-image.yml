name: Docker Image CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
          - service: capture
            context: capture
          - service: recognition
            context: recognition
          - service: frontend
            context: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build ${{ matrix.service }} image
        run: |
          docker build "${{ matrix.context }}" \
            --file "${{ matrix.context }}/Dockerfile" \
            --tag "attendance-${{ matrix.service }}:${{ github.sha }}"
